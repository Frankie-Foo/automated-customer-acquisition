services:
  salesbot:
    build: .
    restart: unless-stopped
    ports:
      - "8765:8765"
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_CONNECT_TIMEOUT: ${DB_CONNECT_TIMEOUT:-10}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      SALESBOT_ADMIN_USERNAME: ${SALESBOT_ADMIN_USERNAME:-admin}
      SALESBOT_ADMIN_PASSWORD: ${SALESBOT_ADMIN_PASSWORD}
      SALESBOT_ADMIN_NAME: ${SALESBOT_ADMIN_NAME:-Admin}
      PROSPEO_API_KEY: ${PROSPEO_API_KEY}
      HUNTER_KEY: ${HUNTER_KEY}
      NINJAPEAR_API_KEY: ${NINJAPEAR_API_KEY}
      PEOPLEDB_API_KEY: ${PEOPLEDB_API_KEY}
      PDL_API_KEY: ${PDL_API_KEY}
      PROXYCURL_KEY: ${PROXYCURL_KEY}
      GOOGLE_CSE_API_KEY: ${GOOGLE_CSE_API_KEY}
      GOOGLE_CSE_ID: ${GOOGLE_CSE_ID}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      RESEND_WEBHOOK_SECRET: ${RESEND_WEBHOOK_SECRET}
      SALESBOT_REQUIRE_PRODUCTION_READY: ${SALESBOT_REQUIRE_PRODUCTION_READY:-false}
      SALESBOT_DB_WAIT_TIMEOUT: ${SALESBOT_DB_WAIT_TIMEOUT:-90}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8765/api/live', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
