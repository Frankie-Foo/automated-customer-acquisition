name: Deploy production

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Commit SHA to deploy (defaults to main HEAD)
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: salesbot-production
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    steps:
      - name: Resolve release SHA
        id: release
        env:
          MANUAL_SHA: ${{ inputs.commit_sha }}
          WORKFLOW_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          if [ -n "$MANUAL_SHA" ]; then
            echo "sha=$MANUAL_SHA" >> "$GITHUB_OUTPUT"
          elif [ -n "$WORKFLOW_SHA" ]; then
            echo "sha=$WORKFLOW_SHA" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.PROD_SSH_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/salesbot_deploy
          chmod 600 ~/.ssh/salesbot_deploy
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy verified commit
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_SSH_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_PATH: ${{ vars.PROD_PATH }}
          COMPOSE_FILE: ${{ vars.PROD_COMPOSE_FILE }}
          RELEASE_SHA: ${{ steps.release.outputs.sha }}
          MAILBOX_USER: ${{ secrets.PROD_MAILBOX_USER }}
          MAILBOX_PASSWORD: ${{ secrets.PROD_MAILBOX_PASSWORD }}
        run: |
          port="${PROD_PORT:-22}"
          path="${PROD_PATH:-/opt/salesbot}"
          compose_file="${COMPOSE_FILE:-deployment/docker-compose.external-db.yml}"
          test -n "$PROD_HOST" && test -n "$PROD_USER"
          test -n "$MAILBOX_USER" && test -n "$MAILBOX_PASSWORD"
          mailbox_config=$(cat <<EOF
          MAIL_PROVIDER=smtp
          MAIL_FROM_EMAIL=$MAILBOX_USER
          SMTP_HOST=smtp.exmail.qq.com
          SMTP_PORT=465
          SMTP_USER=$MAILBOX_USER
          SMTP_PASSWORD=$MAILBOX_PASSWORD
          SMTP_SECURITY=ssl
          SMTP_ENVELOPE_FROM=$MAILBOX_USER
          SMTP_ALLOW_FROM_ALIAS=false
          IMAP_HOST=imap.exmail.qq.com
          IMAP_PORT=993
          IMAP_USER=$MAILBOX_USER
          IMAP_PASSWORD=$MAILBOX_PASSWORD
          IMAP_FOLDER=INBOX
          IMAP_LOOKBACK_DAYS=14
          MAILBOX_POLL_INTERVAL_SECONDS=60
          OUTBOUND_IDENTITY_MODE=legacy
          EOF
          )
          printf '%s\n' "$mailbox_config" | ssh -i ~/.ssh/salesbot_deploy -p "$port" "$PROD_USER@$PROD_HOST" \
            "set -e; cd '$path'; git fetch --prune origin; git switch --detach '$RELEASE_SHA'; python3 scripts/update-mailbox-env.py '$path/.env'; PROD_COMPOSE_FILE='$compose_file' bash scripts/deploy-production.sh '$RELEASE_SHA'"
