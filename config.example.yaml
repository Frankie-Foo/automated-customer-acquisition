database:
  host: ${DB_HOST}
  port: ${DB_PORT}
  user: ${DB_USER}
  password: ${DB_PASSWORD}
  dbname: ${DB_NAME}
  connect_timeout: ${DB_CONNECT_TIMEOUT}

app:
  public_base_url: ${PUBLIC_BASE_URL}

apis:
  ninjapear_key: ${NINJAPEAR_API_KEY}
  prospeo_key: ${PROSPEO_API_KEY}
  peopledb_key: ${PEOPLEDB_API_KEY}
  pdl_key: ${PDL_API_KEY}
  proxycurl_key: ${PROXYCURL_KEY}
  hunter_key: ${HUNTER_KEY}
  openai_key: ${OPENAI_API_KEY}
  deepseek_key: ${DEEPSEEK_API_KEY}
  resend_key: ${RESEND_API_KEY}
  sendgrid_key: ${SENDGRID_API_KEY}
  github_token: ${GITHUB_TOKEN}

llm:
  provider: deepseek
  base_url: https://api.deepseek.com
  model: deepseek-chat

sender:
  name: Your Name
  email: you@outreach-domain.com
  provider: resend
  daily_limit: 100
  dry_run: true

sender_pool:
  strategy: round_robin
  accounts:
    - name: Your Name
      email: you@outreach-domain.com
      provider: resend
      daily_limit: 100
      warmup_stage: production
      dry_run: true

notifications:
  slack_webhook_url: ${SLACK_WEBHOOK_URL}

webhooks:
  resend_secret: ${RESEND_WEBHOOK_SECRET}

sourcing:
  provider: prospeo
  default_limit: 100

email_discovery:
  providers:
    - prospeo
    - ninjapear
    - hunter
    - github
    - pattern_guess
    - smtp_verify
    - gravatar
    - public_website
  max_candidates: 10
  smtp_verify_enabled: false

queue:
  batch_size: 100

quotas:
  global_daily_send_limit: 300
  global_daily_source_limit: 500
  default_user_daily_send: 80
  default_user_daily_source: 100

sequence:
  - step: 1
    delay_days: 0
    subject: "Quick question about {{company_name}}"
    body_template: templates/step1.txt
    ai_opener: true
  - step: 2
    delay_days: 3
    subject: "Re: Quick question about {{company_name}}"
    body_template: templates/step2.txt
    ai_opener: false
  - step: 3
    delay_days: 7
    subject: "Re: Quick question about {{company_name}}"
    body_template: templates/step3.txt
    ai_opener: false
