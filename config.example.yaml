database:
  host: ${DB_HOST}
  port: ${DB_PORT}
  user: ${DB_USER}
  password: ${DB_PASSWORD}
  dbname: ${DB_NAME}
  connect_timeout: ${DB_CONNECT_TIMEOUT}

app:
  public_base_url: ${PUBLIC_BASE_URL}
  tracking_signing_secret: ${TRACKING_SIGNING_SECRET}

sso:
  vps_enabled: ${VPS_SSO_ENABLED}
  odoo_base_url: ${ODOO_BASE_URL}
  auto_create_users: ${VPS_SSO_AUTO_CREATE_USERS}
  default_role: sales
  iframe_cookie: ${VPS_SSO_IFRAME_COOKIE}
  pdca_enabled: ${PDCA_SSO_ENABLED}
  pdca_exchange_url: ${PDCA_SSO_EXCHANGE_URL}
  embed_allowed_origins: ${PDCA_EMBED_ALLOWED_ORIGINS}

apis:
  ninjapear_key: ${NINJAPEAR_API_KEY}
  prospeo_key: ${PROSPEO_API_KEY}
  peopledb_key: ${PEOPLEDB_API_KEY}
  pdl_key: ${PDL_API_KEY}
  proxycurl_key: ${PROXYCURL_KEY}
  hunter_key: ${HUNTER_KEY}
  openai_key: ${OPENAI_API_KEY}
  deepseek_key: ${DEEPSEEK_API_KEY}
  resend_key: ${RESEND_API_KEY}
  sendgrid_key: ${SENDGRID_API_KEY}
  github_token: ${GITHUB_TOKEN}
  google_cse_key: ${GOOGLE_CSE_API_KEY}
  google_cse_id: ${GOOGLE_CSE_ID}
  tavily_key: ${TAVILY_API_KEY}
  brave_search_key: ${BRAVE_SEARCH_API_KEY}

llm:
  provider: deepseek
  base_url: https://api.deepseek.com
  model: deepseek-chat

sender:
  name: VERTU Global
  email: ${MAIL_FROM_EMAIL}
  provider: ${MAIL_PROVIDER}
  daily_limit: 6000
  dry_run: ${MAIL_DRY_RUN}

smtp:
  host: ${SMTP_HOST}
  port: ${SMTP_PORT}
  username: ${SMTP_USER}
  password: ${SMTP_PASSWORD}
  security: ${SMTP_SECURITY}
  timeout: 30
  envelope_from: ${SMTP_ENVELOPE_FROM}
  allow_from_alias: ${SMTP_ALLOW_FROM_ALIAS}

imap:
  host: ${IMAP_HOST}
  port: ${IMAP_PORT}
  username: ${IMAP_USER}
  password: ${IMAP_PASSWORD}
  folder: ${IMAP_FOLDER}
  timeout: 20
  lookback_days: ${IMAP_LOOKBACK_DAYS}

sender_pool:
  strategy: round_robin
  accounts:
    - name: VERTU Global
      email: ${MAIL_FROM_EMAIL}
      provider: ${MAIL_PROVIDER}
      daily_limit: 200
      warmup_stage: production
      dry_run: ${MAIL_DRY_RUN}

outbound_identity:
  mode: ${OUTBOUND_IDENTITY_MODE}
  sending_domain: ${OUTBOUND_SENDING_DOMAIN}
  reply_domain: ${OUTBOUND_REPLY_DOMAIN}
  routing_secret: ${REPLY_ROUTING_SECRET}
  default_localpart: partnerships
  reply_localpart: reply

notifications:
  slack_webhook_url: ${SLACK_WEBHOOK_URL}

webhooks:
  resend_secret: ${RESEND_WEBHOOK_SECRET}
  inbound_email_secret: ${INBOUND_EMAIL_WEBHOOK_SECRET}

sourcing:
  provider: prospeo
  default_limit: 100
  linkedin_public_search:
    max_queries_per_run: 10
    min_lead_score: 50
    auto_domain_lookup: true
    auto_generate_email_candidates: true
    auto_verify_threshold: 70
    max_paid_verifications_per_contact: 2
    max_prospeo_enrichments_per_company: 2

email_discovery:
  providers:
    - prospeo
    - ninjapear
    - hunter
    - github
    - pattern_guess
    - smtp_verify
    - gravatar
    - public_website
  max_candidates: 10
  smtp_verify_enabled: false

queue:
  batch_size: 100

outreach:
  waiting_pool_after_days: 14
  send_delay_seconds: 10
  send_jitter_seconds: 5

automation:
  max_auto_prepare_drafts: 20

quotas:
  global_daily_send_limit: 6000
  global_daily_source_limit: 3000
  default_user_daily_send: 200
  default_user_daily_source: 100

customer_pool:
  private_pool_days: 60
  region_assignments:
    - owner: Lina
      match: ["middle east", "uae", "dubai", "qatar", "kuwait", "iraq", "iran", "turkey", "europe", "russia"]
    - owner: April
      match: ["india", "south asia"]
    - owner: Viki
      match: ["southeast asia", "singapore", "thailand", "vietnam", "cambodia", "malaysia", "indonesia", "philippines"]

sequence:
  - step: 1
    delay_days: 0
    subject: "Quick question about {{company_name}}"
    body_template: templates/step1.txt
    ai_opener: true
  - step: 2
    delay_days: 3
    subject: "Re: Quick question about {{company_name}}"
    body_template: templates/step2.txt
    ai_opener: false
  - step: 3
    delay_days: 7
    subject: "Re: Quick question about {{company_name}}"
    body_template: templates/step3.txt
    ai_opener: false
