<main>
  <header class="appbar">
    <div>
      <span class="eyebrow">Overseas PDCA · Sales Automation</span>
      <h2>获客运营控制台</h2>
      <p>采集线索、富化邮箱、加入发送队列，并持续追踪打开、回复、退订等反馈。</p>
    </div>
    <div class="top-actions">
      <div class="account-box">
        <strong id="account-name">未登录</strong>
        <span id="quota-status">今日配额 --</span>
      </div>
      <button id="logout-button" type="button">退出</button>
      <button id="export-button" type="button">导出客户</button>
      <button id="refresh-button" type="button">刷新</button>
    </div>
  </header>

  <section id="notice" class="notice hidden"></section>

  <div id="react-dashboard-root"></div>

  <section class="customer-workspace" id="customer-workspace">
    <div id="react-workspace-root"></div>
  </section>

  <section class="guide">
    <div class="guide-card active">
      <span>01</span>
      <div>
        <strong>获取线索</strong>
        <p>用自动获客、LinkedIn 公网搜索、CSV 或手动新增把客户放进系统。</p>
      </div>
    </div>
    <div class="guide-card">
      <span>02</span>
      <div>
        <strong>富化邮箱</strong>
        <p>为没有邮箱的客户补充工作邮箱和公司信息。</p>
      </div>
    </div>
    <div class="guide-card">
      <span>03</span>
      <div>
        <strong>入队发送</strong>
        <p>把有效邮箱加入队列，先演练，确认后再真实发送。</p>
      </div>
    </div>
  </section>

  <section id="workbench" class="workbench">
    <div id="react-workbench-root"></div>
  </section>

  <section id="pipeline" class="list-section">
    <div id="react-pipeline-root"></div>
  </section>

  <section id="admin-console" class="admin-console hidden"></section>
